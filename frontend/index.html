<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="EventMitra - Your one-stop solution for all event-related services." />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#5667f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EventMitra" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-TileColor" content="#5667f5" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120x120.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <title>EventMitra - Event Planning Made Easy</title>
    
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 768px) and (device-height: 1024px)" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 1024px) and (device-height: 768px)" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 820px) and (device-height: 1180px)" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 1180px) and (device-height: 820px)" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 834px) and (device-height: 1194px)" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 1194px) and (device-height: 834px)" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 1024px) and (device-height: 1366px)" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" media="(device-width: 1366px) and (device-height: 1024px)" />
    
    <style>
      /* Safe Area Support */
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
      
      /* Prevent overscroll bounce */
      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      
      /* Mobile app-like scrollbar */
      ::-webkit-scrollbar {
        width: 0;
        height: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Modern Animated Splash Screen -->
    <div id="splash-screen">
      <div class="splash-particles">
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>
      </div>
      <div class="splash-content">
        <div class="logo-container">
          <div class="logo-glow"></div>
          <img src="/icons/icon-192x192.png" alt="EventMitra" class="logo-img" />
        </div>
        <div class="brand-name">
          <span class="brand-text">EventMitra</span>
          <span class="brand-dot"></span>
        </div>
        <p class="tagline">Event Planning Made Easy</p>
        <div class="loader-dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>
    
    <style>
      /* Splash Screen Base Styles */
      #splash-screen {
        display: flex;
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
        z-index: 99999;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      
      /* Hide on desktop */
      @media only screen and (min-width: 1025px) {
        #splash-screen { display: none; }
      }
      
      /* Floating Particles */
      .splash-particles {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      
      .particle {
        position: absolute;
        border-radius: 50%;
        opacity: 0.6;
        animation: float 6s ease-in-out infinite;
      }
      
      .p1 { width: 8px; height: 8px; background: #6366f1; top: 10%; left: 20%; animation-delay: 0s; }
      .p2 { width: 12px; height: 12px; background: #8b5cf6; top: 60%; left: 10%; animation-delay: 1s; }
      .p3 { width: 6px; height: 6px; background: #06b6d4; top: 20%; left: 80%; animation-delay: 2s; }
      .p4 { width: 10px; height: 10px; background: #f472b6; top: 70%; left: 70%; animation-delay: 0.5s; }
      .p5 { width: 14px; height: 14px; background: #a78bfa; top: 40%; left: 90%; animation-delay: 1.5s; }
      .p6 { width: 7px; height: 7px; background: #34d399; top: 80%; left: 40%; animation-delay: 2.5s; }
      .p7 { width: 9px; height: 9px; background: #fbbf24; top: 30%; left: 30%; animation-delay: 3s; }
      .p8 { width: 11px; height: 11px; background: #f87171; top: 50%; left: 60%; animation-delay: 1s; }
      
      @keyframes float {
        0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
        50% { transform: translateY(-30px) scale(1.2); opacity: 1; }
      }
      
      /* Logo Container with Glow */
      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        animation: fadeIn 0.8s ease-out;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
      }
      
      .logo-container {
        position: relative;
        width: 160px;
        height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .logo-glow {
        position: absolute;
        width: 180px;
        height: 180px;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.4) 0%, rgba(139, 92, 246, 0.2) 40%, transparent 70%);
        border-radius: 50%;
        animation: glow 2s ease-in-out infinite, spin 8s linear infinite;
      }
      
      @keyframes glow {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.15); opacity: 1; }
      }
      
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      .logo-img {
        width: 120px;
        height: 120px;
        object-fit: contain;
        border-radius: 24px;
        animation: logoPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 1;
      }
      
      @keyframes logoPop {
        0% { transform: scale(0) rotate(-10deg); }
        60% { transform: scale(1.1) rotate(3deg); }
        100% { transform: scale(1) rotate(0deg); }
      }
      
      /* Brand Name with Animated Dot */
      .brand-name {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      
      .brand-text {
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 32px;
        font-weight: 700;
        background: linear-gradient(135deg, #fff 0%, #c4b5fd 50%, #a78bfa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.05em;
        animation:slideIn 0.6s ease-out 0.3s both;
      }
      
      @keyframes slideIn {
        from { opacity: 0; transform: translateX(-20px); }
        to { opacity: 1; transform: translateX(0); }
      }
      
      .brand-dot {
        width: 10px;
        height: 10px;
        background: #6366f1;
        border-radius: 50%;
        animation: dotPulse 1.5s ease-in-out infinite;
      }
      
      @keyframes dotPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.5); opacity: 0.5; }
      }
      
      .tagline {
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        animation: fadeInUp 0.6s ease-out 0.5s both;
      }
      
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      /* Loading Dots */
      .loader-dots {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      
      .loader-dots .dot {
        width: 8px;
        height: 8px;
        background: #6366f1;
        border-radius: 50%;
        animation: dotBounce 1.4s ease-in-out infinite;
      }
      
      .loader-dots .dot:nth-child(1) { animation-delay: 0s; }
      .loader-dots .dot:nth-child(2) { animation-delay: 0.2s; }
      .loader-dots .dot:nth-child(3) { animation-delay: 0.4s; }
      
      @keyframes dotBounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
      }
      
      /* Fade Out Animation */
      #splash-screen.hide {
        animation: splashHide 0.6s ease-out forwards;
      }
      
      @keyframes splashHide {
        0% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(1.1); pointer-events: none; }
      }
    </style>
    
    <script>
      // Modern Splash Screen Controller
      (function() {
        var splash = document.getElementById('splash-screen');
        if (!splash || window.innerWidth > 1024) return;
        
        var duration = 3500;
        
        setTimeout(function() {
          splash.classList.add('hide');
          setTimeout(function() {
            splash.style.display = 'none';
          }, 600);
        }, duration);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
